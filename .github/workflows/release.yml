name: Release

# Publishes the arm64 binary the Pi installer downloads. Trigger by pushing a
# semver tag, e.g.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & publish arm64 binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate templates
        run: go tool templ generate

      - name: Cross-compile for linux/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -trimpath -ldflags="-s -w" -o holocron-linux-arm64 ./cmd/holocron
          sha256sum holocron-linux-arm64 > holocron-linux-arm64.sha256

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            holocron-linux-arm64 holocron-linux-arm64.sha256 \
            --title "Holocron $TAG" \
            --generate-notes
